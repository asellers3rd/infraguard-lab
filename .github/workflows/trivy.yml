name: trivy

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '.github/workflows/trivy.yml'

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.list.outputs.scenarios }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: list
        run: |
          changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD" -- '*.tf' \
            | awk -F/ 'NF>1 {print $1}' | sort -u)
          json=$(printf '%s\n' "$changed" | jq -R . | jq -sc 'map(select(length>0))')
          echo "Changed scenarios: $json"
          echo "scenarios=$json" >> "$GITHUB_OUTPUT"

  trivy:
    needs: detect
    if: needs.detect.outputs.scenarios != '[]' && needs.detect.outputs.scenarios != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.detect.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@v4
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ matrix.scenario }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          hide-progress: true
